[project]
name = "keybox-downloader"
version = "0.99.9"
description = "Downloads TrickyStore Keyboxes from GitHub projects"
requires-python = ">=3.12"
dependencies = [
    "asyncstdlib==3.14.0",
    "beautifulsoup4==4.15.0",
    "cloudscraper==1.2.71",
    "cryptography==49.0.0",
    "httpx[brotli,http2]==0.28.1",
    "prompt-toolkit==3.0.52",
    "python-dotenv==1.2.2",
    "requests==2.34.2",
    "tqdm==4.68.3",
]

[project.optional-dependencies]
dev = [
    "python-dotenv[cli]==1.2.2",
    "ruff==0.15.19",
]

pc = [
    "adbutils==2.12.0",
]

build = [
    "imageio>=2.37.3",
    "nuitka[app]",
    "poethepoet==0.46.0",
    "pyinstaller==6.21.0",
]

[tool.poe.tasks]
# Windows may need `--include-windows-runtime-dlls=yes`
build_nuitka = """
    nuitka
    --clang
    --lto=auto
    --include-distribution-metadata=keybox-downloader
    --mode=onefile
    --include-data-dir=scripts=scripts
    --include-package-data=cloudscraper
    --onefile-no-compression
    --enable-plugin=upx
    main.py
"""
build_pyinstaller = """
    pyinstaller
    --copy-metadata keybox-downloader
    --onefile
    --add-data "scripts:scripts"
    main.py
"""
build_github = """
    nuitka
    --assume-yes-for-downloads
    --clang
    --lto=auto
    --include-distribution-metadata=keybox-downloader
    --mode=onefile
    --include-data-dir=scripts=scripts
    --include-package-data=cloudscraper
    --windows-icon-from-ico=images/key-icon.png
    --output-filename=KeyDL.exe
    main.py
"""

[tool.setuptools.packages.find]
include = [
    "program*",
    "downloaders*",
    "cache_data*",
]
exclude = [
    "logs*",
    "cache*",
    "backups*",
    "keyboxes*",
]

[tool.uv.sources]
nuitka = { git = "https://github.com/Nuitka/Nuitka.git", rev = "develop" }
