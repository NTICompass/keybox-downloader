[project]
name = "keybox-downloader"
version = "0.99.9"
description = "Downloads TrickyStore Keyboxes from GitHub projects"
requires-python = ">=3.12"
dependencies = [
    "asyncstdlib",
    "beautifulsoup4",
    "cloudscraper",
    "cryptography",
    "httpx[brotli,http2]",
    "prompt-toolkit",
    "python-dotenv",
    "requests",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "pyinstaller",
    "python-dotenv[cli]",
    "ruff",
]

pc = [
    "adbutils",
]