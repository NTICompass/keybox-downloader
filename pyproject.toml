[project]
name = "keybox-downloader"
version = "0.99.9"
description = "Downloads TrickyStore Keyboxes from GitHub projects"
requires-python = ">=3.12"
dependencies = [
    "asyncstdlib",
    "beautifulsoup4",
    "cloudscraper",
    "cryptography",
    "httpx[brotli,http2]",
    "prompt-toolkit",
    "python-dotenv",
    "requests==2.34.1",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "python-dotenv[cli]",
    "ruff",
]

pc = [
    "adbutils",
]

build = [
    "pyinstaller",
]

[tool.setuptools.packages.find]
include = [
    "program*",
    "downloaders*",
    "utils*",
    "cache_data*",
]
exclude = [
    "logs*",
    "cache*",
    "backups*",
    "keyboxes*",
]
