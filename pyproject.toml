[project]
name = "keybox-downloader"
version = "0.99.9"
description = "Downloads TrickyStore Keyboxes from GitHub projects"
requires-python = ">=3.12"
dependencies = [
    "asyncstdlib==3.14.0",
    "beautifulsoup4==4.15.0",
    "cloudscraper==1.2.71",
    "cryptography==48.0.1",
    "httpx[brotli,http2]==0.28.1",
    "prompt-toolkit==3.0.52",
    "python-dotenv==1.2.2",
    "requests==2.34.2",
    "tqdm==4.68.2",
]

[project.optional-dependencies]
dev = [
    "python-dotenv[cli]==1.2.2",
    "ruff==0.15.17",
]

pc = [
    "adbutils==2.12.0",
]

build = [
    "Nuitka==4.1.2",
    "poethepoet==0.46.0",
    "pyinstaller==6.20.0",
]

[tool.poe.tasks]
build_nuitka = """
    nuitka
    --clang
    --lto=auto
    --include-distribution-metadata=keybox-downloader
    --mode=onefile
    --include-data-dir=scripts=scripts
    --include-package-data=cloudscraper
    --enable-plugin=upx
    main.py
"""
build_pyinstaller = """
    pyinstaller
    --copy-metadata keybox-downloader
    --onefile
    --add-data "scripts:scripts"
    main.py
"""

[tool.setuptools.packages.find]
include = [
    "program*",
    "downloaders*",
    "utils*",
    "cache_data*",
]
exclude = [
    "logs*",
    "cache*",
    "backups*",
    "keyboxes*",
]
